<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>基于大模型的 PPT 自动生成系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="authView" class="auth-shell">
      <section class="auth-brand">
        <div class="logo-mark">P</div>
        <p class="eyebrow">LLM PPT Generator</p>
        <h1>基于大模型的 PPT 自动生成系统</h1>
        <div class="brand-grid">
          <span>FastAPI</span>
          <span>LangChain</span>
          <span>Chroma RAG</span>
          <span>python-pptx</span>
        </div>
      </section>

      <section class="auth-panel">
        <div class="auth-tabs">
          <button class="active" type="button" data-auth-tab="login">登录</button>
          <button type="button" data-auth-tab="register">注册</button>
        </div>

        <form id="loginForm" class="auth-form">
          <label>
            用户名或邮箱
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-btn" type="submit">登录</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
          <label>
            用户名
            <input name="username" minlength="3" maxlength="64" autocomplete="username" required />
          </label>
          <label>
            邮箱
            <input name="email" type="email" autocomplete="email" />
          </label>
          <label>
            密码
            <input name="password" type="password" minlength="6" autocomplete="new-password" required />
          </label>
          <button class="primary-btn" type="submit">创建账户</button>
        </form>
      </section>
    </div>

    <div id="appView" class="app-shell hidden">
      <header class="app-topbar">
        <div class="topbar-title">
          <div class="logo-mark small">P</div>
          <div>
            <strong>基于大模型的 PPT 自动生成系统</strong>
            <span>资料解析 · 检索增强 · 大纲编辑 · 模板导出</span>
          </div>
        </div>
        <nav class="top-nav">
          <button class="active" type="button" data-page="generatePage">PPT 生成</button>
          <button type="button" data-page="rechargePage">充值中心</button>
          <button type="button" data-page="recordsPage">历史记录</button>
        </nav>
        <div class="account-bar">
          <span id="currentUser">-</span>
          <strong><span id="currentPoints">0</span> 积分</strong>
          <button id="logoutBtn" type="button">退出登录</button>
        </div>
      </header>

      <main class="main">
        <section id="generatePage" class="workspace active">
          <div class="flow-grid">
            <section class="panel settings-panel">
              <div class="section-head">
                <h2>PPT 参数设置</h2>
              </div>
              <div class="form-grid">
                <label class="wide-field">
                  PPT 主题
                  <input id="topicInput" placeholder="基于大模型的 PPT 自动生成系统" required />
                </label>
                <label>
                  使用场景
                  <select id="sceneSelect">
                    <option>毕业答辩</option>
                    <option>课程汇报</option>
                    <option>商业汇报</option>
                    <option>产品介绍</option>
                    <option>学术报告</option>
                  </select>
                </label>
                <label>
                  页数
                  <input id="pageCountInput" type="number" min="3" max="20" value="8" />
                </label>
                <label>
                  风格
                  <select id="styleSelect">
                    <option>科技蓝白</option>
                    <option>学术答辩</option>
                    <option>简洁商务</option>
                    <option>简约黑白</option>
                    <option>产品发布</option>
                  </select>
                </label>
                <label>
                  模板选择
                  <select id="templateSelect"></select>
                </label>
                <label class="toggle-line">
                  <input id="useImagesCheckbox" type="checkbox" checked />
                  自动配图
                </label>
              </div>
            </section>

            <section class="panel upload-panel">
              <div class="section-head">
                <h2>上传参考资料</h2>
                <button id="refreshFilesBtn" type="button">刷新</button>
              </div>
              <div class="upload-box">
                <input id="referenceFileInput" type="file" multiple accept=".txt,.md,.pdf,.docx,.pptx" />
                <button id="uploadFileBtn" class="secondary-btn" type="button">上传文件</button>
              </div>
              <div id="uploadedFileList" class="file-list"></div>
            </section>

            <section class="panel reference-panel">
              <div class="section-head">
                <h2>参考资料输入</h2>
              </div>
              <textarea id="referenceContextInput" rows="8" placeholder="可以粘贴补充资料、设计说明、答辩要点或系统流程。"></textarea>
            </section>

            <section class="panel outline-panel">
              <div class="section-head">
                <h2>大纲生成与二次编辑</h2>
                <button id="generateOutlineBtn" class="primary-btn" type="button">生成大纲</button>
              </div>
              <div id="outlineMeta" class="outline-meta hidden">
                <label>
                  标题
                  <input id="outlineTitleInput" />
                </label>
                <label>
                  副标题
                  <input id="outlineSubtitleInput" />
                </label>
              </div>
              <div id="outlinePreview" class="outline-preview empty-state">等待生成大纲</div>
            </section>

            <section class="panel export-panel">
              <div class="section-head">
                <h2>PPT 导出</h2>
                <button id="exportPptBtn" class="primary-btn" type="button" disabled>确认生成 PPT</button>
              </div>
              <div id="progressList" class="progress-list"></div>
              <div id="downloadArea" class="download-area hidden"></div>
            </section>

            <section class="panel history-panel">
              <div class="section-head">
                <h2>历史 PPT</h2>
                <button id="refreshRecordsInlineBtn" type="button">刷新</button>
              </div>
              <div id="historyList" class="record-list"></div>
            </section>
          </div>
        </section>

        <section id="rechargePage" class="workspace">
          <section class="panel">
            <div class="section-head">
              <h2>充值中心</h2>
              <button id="refreshOrdersBtn" type="button">刷新订单</button>
            </div>
            <div id="packageList" class="package-grid"></div>
          </section>
          <section class="panel">
            <div class="section-head">
              <h2>充值记录</h2>
            </div>
            <div id="orderList" class="record-list"></div>
          </section>
        </section>

        <section id="recordsPage" class="workspace">
          <section class="panel">
            <div class="section-head">
              <h2>历史记录</h2>
              <button id="refreshRecordsBtn" type="button">刷新记录</button>
            </div>
            <div id="pptRecordList" class="record-list"></div>
          </section>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="./app.js"></script>
  </body>
</html>
